name: Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'resources/**'
      - '.github/workflows/windows.yml'
permissions:
  contents: read

jobs:
  build-windows:
    permissions:
      contents: write       # for actions/upload-release-asset to upload release asset
    runs-on: windows-latest
    
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }} # Needs to be added through github
      PROJECT_NAME: stress-release-by-particles
      PROJECT_BUILD_PATH: build
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_windows
      PROJECT_CUSTOM_FLAGS: ""
      PROJECT_RESOURCES_PATH: resources

    steps:
      - uses: actions/checkout@v4

      - name: Cache build/_deps
        uses: actions/cache@v3
        with:
          path: ${{github.workspace}}/build/_deps
          key: ${{ matrix.os }}-build-deps
          restore-keys: ${{ matrix.os }}-build-deps

      - name: Create Build Environment
        # Some projects don't allow in-source building, so create a separate build directory
        # We'll use this as our working directory for all subsequent commands
        run: cmake -E make_directory ${{github.workspace}}/build

      - name: Configure CMake
        # Use a bash shell so we can use the same syntax for environment variable
        # access regardless of the host operating system
        shell: powershell
        working-directory: ${{github.workspace}}/build
        # Note the current convention is to use the -S and -B options here to specify source
        # and build directories, but this is only available with CMake 3.13 and higher.
        # The CMake binaries on the Github Actions machines are (as of this writing) 3.12
        run: cmake $env:GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=Release -DPLATFORM=Desktop

      - name: Build
        working-directory: ${{github.workspace}}/build
        shell: powershell
        # Execute the build.  You can specify a specific target with "--target <NAME>"
        run: cmake --build . --config Release

      - name: Generate Artifacts
        run: |
          # ls ${{ env.PROJECT_BUILD_PATH }}
          cp -r ${{ env.PROJECT_BUILD_PATH }}/${{ env.PROJECT_NAME }} ${{ env.PROJECT_RELEASE_PATH }}
          cp README.md ${{ env.PROJECT_RELEASE_PATH }}
          cp LICENSE ${{ env.PROJECT_RELEASE_PATH }}
          ls ${{ env.PROJECT_RELEASE_PATH }}
          7z a ./${{ env.PROJECT_RELEASE_PATH }}.zip ./${{ env.PROJECT_RELEASE_PATH }}

      # Removing because I do not have money
      # - name: Upload Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ env.PROJECT_RELEASE_PATH }}
      #     path: ./${{ env.PROJECT_RELEASE_PATH }}

      - name: Download + Authorize Butler
        run: |
            curl -L -o butler.zip https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default
            7z x .\butler.zip
            .\butler.exe -V

      - name: Login To Butler
        run: .\butler.exe login

      - name: Push Windows to Itch
        run: .\butler.exe push ${{ env.PROJECT_RELEASE_PATH }} maiconspas/stress-release-by-particles:windows